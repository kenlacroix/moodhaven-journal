name: Build & Release

# Triggered by:
#   - Pushing a version tag (v1.2.3)  → builds + creates GitHub release
#   - Manual dispatch                  → builds only (dry_run=true by default)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build without publishing a release
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Validate version format before any build work ──────────────────────────
  validate-tag:
    name: Validate version format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check tauri.conf.json and Cargo.toml use 3-part semver
        run: |
          TAURI_VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          validate_semver() {
            local label="$1" ver="$2"
            if ! echo "$ver" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: $label version '$ver' must be 3-part semver (e.g. '1.6.0')."
              echo "The 4th component belongs in the git tag only."
              exit 1
            fi
            echo "$label version: $ver (OK)"
          }

          validate_semver "tauri.conf.json" "$TAURI_VERSION"
          validate_semver "Cargo.toml" "$CARGO_VERSION"

  # ── Build on all platforms ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue_on_error == true }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # cmake_extra carries a baseline-ISA flag set on every x86-64 target so the
          # whisper-cli sidecar runs on processors without AVX2/FMA/BMI2 (older CPUs,
          # Pentium/Celeron, many virtualised CPUs). Without it ggml defaults to AVX2
          # on x86-64 and the sidecar dies with an illegal-instruction fault. SSE4.2 is
          # kept (universal since ~2010). arm64 uses NEON and is unaffected.
          - platform: Linux (x86_64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            whisper_binary: whisper-x86_64-unknown-linux-gnu
            cmake_extra: "-DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF"
            cross: false

          - platform: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            whisper_binary: whisper-x86_64-pc-windows-msvc.exe
            cmake_extra: "-DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF"
            cross: false

          - platform: macOS (x86_64)
            os: macos-latest
            target: x86_64-apple-darwin
            whisper_binary: whisper-x86_64-apple-darwin
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF -DGGML_BMI2=OFF"
            cross: false

          - platform: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            whisper_binary: whisper-aarch64-apple-darwin
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            build-essential

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (2026-04-04)
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # ── whisper-cli sidecar ─────────────────────────────────────────────────
      - name: Cache whisper-cli binary
        id: whisper_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: src-tauri/binaries/${{ matrix.whisper_binary }}
          key: whisper-${{ matrix.whisper_binary }}-v1.7.4-baseline-isa

      - name: Build whisper-cli sidecar
        if: steps.whisper_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch v1.7.4 https://github.com/ggerganov/whisper.cpp /tmp/whisper
          cd /tmp/whisper
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_NATIVE=OFF ${{ matrix.cmake_extra }}
          cmake --build build --config Release --target whisper-cli -j4

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="build/bin/Release/whisper-cli.exe"
          else
            BIN="build/bin/whisper-cli"
          fi

          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          cp "$BIN" "$GITHUB_WORKSPACE/src-tauri/binaries/${{ matrix.whisper_binary }}"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/${{ matrix.whisper_binary }}"

      # ── Tauri build + release ───────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarization (optional — uncomment when certs are configured)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MoodHaven Journal ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG](https://github.com/kenlacroix/moodhaven-journal/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
        # Skip release creation on manual dry-run dispatches. `dry_run` is a boolean input, so
        # compare it as a boolean (the old `== 'false'` string compare always coerced to false,
        # which silently skipped this step on every manual dispatch).
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)

      - name: Build Tauri app (dry run — no release)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
        # `dry_run` is a boolean input — use it directly (the old `== 'true'` string compare
        # coerced to false, so this build step never actually ran on a manual dispatch).
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run

      # Upload artifacts for the checksum job (and for manual dry-run installer testing)
      - name: Upload artifacts
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          retention-days: 1

      # Sign the installers and upload the updater minisign signatures.
      # The in-app updater (src-tauri/src/commands/updater.rs) fetches
      # "<asset>.sig" for the asset it downloads (AppImage / NSIS setup.exe / dmg)
      # and treats a missing signature as a hard error. tauri-action signs the
      # bundles during the build but then deletes the `.sig` companions (and the
      # duplicate lowercase bundles) right after uploading the primary installers,
      # so they never reach the release. Re-sign the installers that remain on
      # disk with the same key and upload the signatures. The signature is over
      # the exact installer bytes, so it verifies against the compiled-in pubkey.
      - name: Sign installers and upload updater signatures
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          TAG="${{ github.ref_name }}"
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          # Capitalised product-name globs match the installers tauri-action
          # uploaded (skipping the lowercase mood-haven_* duplicate bundles).
          installers=( "$BUNDLE"/appimage/MoodHaven_*.AppImage \
                       "$BUNDLE"/nsis/MoodHaven_*-setup.exe \
                       "$BUNDLE"/dmg/MoodHaven_*.dmg )
          if [ ${#installers[@]} -eq 0 ]; then
            echo "No updater installers found for ${{ matrix.target }}; skipping."
            exit 0
          fi
          for f in "${installers[@]}"; do
            echo "Signing $(basename "$f")"
            npx --no-install @tauri-apps/cli signer sign "$f"
            # `tauri signer sign` writes a base64-WRAPPED .sig. The in-app updater
            # (verify_minisign) feeds the .sig straight into minisign-verify's
            # Signature::decode, which expects the RAW minisign text — so it
            # rejects the base64-wrapped form. Publish the base64-DECODED
            # signature. openssl is used for a portable decode (BSD base64 on
            # macOS has no `-d`). Locked by a regression test in updater.rs.
            openssl base64 -d -A -in "$f.sig" -out "$f.sig.raw"
            mv "$f.sig.raw" "$f.sig"
            gh release upload "$TAG" "$f.sig" --clobber
            echo "Uploaded $(basename "$f").sig"
          done

  # ── Android: Wear OS companion APK ─────────────────────────────────────────
  build-android:
    name: Build Android (Wear OS companion)
    needs: validate-tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Update tauri.properties version to match release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Trim to 3-part semver so 4-part tags (e.g. 1.6.0.2) don't break arithmetic
          SEMVER=$(echo "$VERSION" | cut -d. -f1-3)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 1000 + PATCH ))
          printf '// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.\ntauri.android.versionName=%s\ntauri.android.versionCode=%s\n' \
            "$VERSION" "$VERSION_CODE" \
            > src-tauri/gen/android/app/tauri.properties

      - name: Cache Gradle packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Wear OS release AAB
        working-directory: src-tauri/gen/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :wear:bundleRelease --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload AAB artifact (for release attachment in update-manifest)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wear-aab
          path: src-tauri/gen/android/wear/build/outputs/bundle/release/wear-release.aab
          retention-days: 1

  # ── Android: Phone app APK (Tauri + Rust, arm64 only, debug-signed) ─────────
  build-android-phone:
    name: Build Android phone APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (2026-04-04)
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: src-tauri
          key: aarch64-linux-android

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Android phone release AAB (arm64)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # tauri-build requires the whisper sidecar to exist for each target. Sidecars
          # are desktop-only on Android (Android cannot exec arbitrary binaries) so we
          # create a placeholder that satisfies the file existence check.
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/whisper-aarch64-linux-android
          # NDK_HOME must be exported from the shell env, not ${{ env.* }}
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          # Set up NDK cross-compilation toolchain for openssl-sys vendored build
          export TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          export CXX_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang++
          export AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar
          export RANLIB_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ranlib
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/bin/aarch64-linux-android21-clang
          export OPENSSL_STATIC=1
          npm run tauri android build -- --target aarch64

      - name: Upload phone AAB artifact (for release attachment in update-manifest)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: phone-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          retention-days: 1

  # ── Post-build: checksums + release notes ──────────────────────────────────
  update-manifest:
    needs: [build, build-android, build-android-phone]
    if: github.event_name == 'push' && !cancelled()
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts/

      - name: Attach Wear OS AAB to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AAB=$(find artifacts/wear-aab -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            gh release upload "${{ github.ref_name }}" "$AAB" --clobber
          fi

      - name: Attach phone AAB to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AAB=$(find artifacts/phone-aab -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            gh release upload "${{ github.ref_name }}" "$AAB" --clobber
          fi

      - name: Generate checksums.txt and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: node scripts/generate-checksums.cjs

      # Submit installers to VirusTotal and publish per-asset report links.
      # Transparency signal only (not a code signature); never blocks a release.
      - name: Submit installers to VirusTotal
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: node scripts/submit-virustotal.cjs

      - name: Generate latest-release.json and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Use the version from tauri.conf.json for asset filenames — Tauri uses
          # this (not the git tag) when naming .AppImage/.exe/.dmg bundles. The git
          # tag may use a 4-part scheme (e.g. v1.6.0.1) while Cargo/Tauri require
          # 3-part semver (1.6.0).
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUBLISHED_AT=$(gh release view "$TAG" --json publishedAt -q '.publishedAt')

          # Fetch checksums.txt to mark verified assets
          CHECKSUMS=$(gh release download "$TAG" -p checksums.txt -D /tmp 2>/dev/null && cat /tmp/checksums.txt || echo "")

          build_asset() {
            local name="$1"
            local size_bytes
            size_bytes=$(gh release view "$TAG" --json assets -q ".assets[] | select(.name == \"$name\") | .size" 2>/dev/null || echo "")
            if [ -z "$size_bytes" ]; then return; fi
            local size_mb
            size_mb=$(echo "scale=1; $size_bytes / 1048576" | bc)
            local verified="false"
            echo "$CHECKSUMS" | grep -q "$name" && verified="true"
            printf '    {"name":"%s","downloadUrl":"%s/%s","sizeLabel":"%s MB","checksumVerified":%s}' \
              "$name" "$BASE" "$name" "$size_mb" "$verified"
          }

          ASSETS=()
          for name in \
            "MoodHaven_${VERSION}_amd64.AppImage" \
            "MoodHaven_${VERSION}_amd64.deb" \
            "MoodHaven-${VERSION}-1.x86_64.rpm" \
            "MoodHaven_${VERSION}_x64-setup.exe" \
            "MoodHaven_${VERSION}_x64_en-US.msi" \
            "MoodHaven_${VERSION}_aarch64.dmg" \
            "MoodHaven_${VERSION}_x64.dmg" \
            "app-release.aab" \
            "wear-release.aab"; do
            entry=$(build_asset "$name")
            [ -n "$entry" ] && ASSETS+=("$entry")
          done

          # Comma-join, then pretty-print with jq for safety
          ASSETS_RAW="[$(printf '%s\n' "${ASSETS[@]}" | paste -sd ',')]"

          # Severity: releases at or above the 1.8.0 encryption-at-rest floor are
          # security updates for the pre-1.8.0 (plaintext-DB) cohort. The in-app
          # updater computes this from the *running* version; this field mirrors
          # it for the website / external consumers of latest-release.json.
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          SEVERITY="recommended"
          if [ "$MAJOR" -gt 1 ] || { [ "$MAJOR" -eq 1 ] && [ "$MINOR" -ge 8 ]; }; then
            SEVERITY="security"
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg releaseUrl "https://github.com/${{ github.repository }}/releases/tag/$TAG" \
            --arg publishedAt "$PUBLISHED_AT" \
            --arg severity "$SEVERITY" \
            --argjson assets "$ASSETS_RAW" \
            '{ version: $version, releaseUrl: $releaseUrl, publishedAt: $publishedAt, severity: $severity, assets: $assets }' \
            > latest-release.json
          echo "Generated latest-release.json with $(jq 'length' <<< "$ASSETS_RAW") assets (severity: $SEVERITY)"

          gh release upload "$TAG" latest-release.json --clobber

      - name: Update release notes from tag annotation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          if [ -n "$TAG_MSG" ]; then
            gh release edit "$TAG" --notes "$TAG_MSG"
          fi
