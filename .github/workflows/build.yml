name: Build & Release

# Triggered by:
#   - Pushing a version tag (v1.2.3)  → builds + creates GitHub release
#   - Manual dispatch                  → builds only (dry_run=true by default)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build without publishing a release
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build on all platforms ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue_on_error == true }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux (x86_64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            whisper_binary: whisper-x86_64-unknown-linux-gnu
            cmake_extra: ""
            cross: false

          - platform: Linux (aarch64)
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            whisper_binary: whisper-aarch64-unknown-linux-gnu
            cmake_extra: >-
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
            cross: true
            continue_on_error: true

          - platform: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            whisper_binary: whisper-x86_64-pc-windows-msvc.exe
            cmake_extra: ""
            cross: false

          - platform: macOS (x86_64)
            os: macos-latest
            target: x86_64-apple-darwin
            whisper_binary: whisper-x86_64-apple-darwin
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            cross: false

          - platform: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            whisper_binary: whisper-aarch64-apple-darwin
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            build-essential

      - name: Install aarch64 cross-compile toolchain + arm64 sysroot (Linux arm64 only)
        if: matrix.cross == true
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict all existing sources to amd64 (sources.list + sources.list.d)
          sudo sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
          sudo find /etc/apt/sources.list.d/ -name "*.list" -exec \
            sudo sed -i 's/^deb http/deb [arch=amd64] http/g' {} \;
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # ── whisper-cli sidecar ─────────────────────────────────────────────────
      - name: Get whisper.cpp HEAD SHA (for cache key)
        id: whisper_hash
        shell: bash
        run: |
          SHA=$(git ls-remote https://github.com/ggerganov/whisper.cpp HEAD | cut -f1 | cut -c1-8)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Cache whisper-cli binary
        id: whisper_cache
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/${{ matrix.whisper_binary }}
          key: whisper-${{ matrix.whisper_binary }}-${{ steps.whisper_hash.outputs.sha }}

      - name: Build whisper-cli sidecar
        if: steps.whisper_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp /tmp/whisper
          cd /tmp/whisper
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_NATIVE=OFF ${{ matrix.cmake_extra }}
          cmake --build build --config Release --target whisper-cli -j4

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="build/bin/Release/whisper-cli.exe"
          else
            BIN="build/bin/whisper-cli"
          fi

          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          cp "$BIN" "$GITHUB_WORKSPACE/src-tauri/binaries/${{ matrix.whisper_binary }}"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/${{ matrix.whisper_binary }}"

      # ── Tauri build + release ───────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarization (optional — uncomment when certs are configured)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MoodBloom ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG](https://github.com/kenlacroix/moodhaven-journal/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
        # Skip release creation on manual dry-run dispatches
        if: github.event_name == 'push' || inputs.dry_run == 'false'

      - name: Build Tauri app (dry run — no release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'

      # Upload artifacts for the checksum job
      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          retention-days: 1

  # ── Android: Wear OS companion APK ─────────────────────────────────────────
  # Phase 1: debug-signed wear APK only.
  # Phase 2 (TODO): sign with upload keystore (ANDROID_KEYSTORE_BASE64 +
  #   ANDROID_KEY_ALIAS + ANDROID_KEY_PASSWORD secrets), swap assembleDebug
  #   for bundleRelease to produce .aab for Play Store submission.
  # Note: :app (Tauri Android app) is excluded — it requires Rust + NDK
  #   cross-compilation for 4 targets. Handle via `npm run tauri android build`
  #   in a dedicated job when ready.
  # Note: wearApp { uses ':wear' } is not yet added to app/build.gradle.kts —
  #   required for Play Store auto-install pairing before submission.
  build-android:
    name: Build Android (Wear OS companion)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Update tauri.properties version to match release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 1000 + PATCH ))
          printf '// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.\ntauri.android.versionName=%s\ntauri.android.versionCode=%s\n' \
            "$VERSION" "$VERSION_CODE" \
            > src-tauri/gen/android/app/tauri.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Wear OS debug APK
        working-directory: src-tauri/gen/android
        run: ./gradlew :wear:assembleDebug --no-daemon

      - name: Upload Wear OS APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            src-tauri/gen/android/wear/build/outputs/apk/debug/wear-debug.apk \
            --clobber

  # ── Post-build: checksums + release notes ──────────────────────────────────
  update-manifest:
    needs: [build, build-android]
    if: github.event_name == 'push' && !cancelled()
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums.txt and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: node scripts/generate-checksums.js

      - name: Update release notes from tag annotation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          if [ -n "$TAG_MSG" ]; then
            gh release edit "$TAG" --notes "$TAG_MSG"
          fi
