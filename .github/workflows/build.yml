name: Build & Release

# Triggered by:
#   - Pushing a version tag (v1.2.3)  → builds + creates GitHub release
#   - Manual dispatch                  → builds only (dry_run=true by default)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build without publishing a release
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build on all platforms ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue_on_error == true }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux (x86_64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            whisper_binary: whisper-x86_64-unknown-linux-gnu
            cmake_extra: ""
            cross: false

          - platform: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            whisper_binary: whisper-x86_64-pc-windows-msvc.exe
            cmake_extra: ""
            cross: false

          - platform: macOS (x86_64)
            os: macos-latest
            target: x86_64-apple-darwin
            whisper_binary: whisper-x86_64-apple-darwin
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            cross: false

          - platform: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            whisper_binary: whisper-aarch64-apple-darwin
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            cmake \
            build-essential

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (2026-04-04)
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # ── whisper-cli sidecar ─────────────────────────────────────────────────
      - name: Cache whisper-cli binary
        id: whisper_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: src-tauri/binaries/${{ matrix.whisper_binary }}
          key: whisper-${{ matrix.whisper_binary }}-v1.7.4

      - name: Build whisper-cli sidecar
        if: steps.whisper_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch v1.7.4 https://github.com/ggerganov/whisper.cpp /tmp/whisper
          cd /tmp/whisper
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_NATIVE=OFF ${{ matrix.cmake_extra }}
          cmake --build build --config Release --target whisper-cli -j4

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN="build/bin/Release/whisper-cli.exe"
          else
            BIN="build/bin/whisper-cli"
          fi

          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          cp "$BIN" "$GITHUB_WORKSPACE/src-tauri/binaries/${{ matrix.whisper_binary }}"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/${{ matrix.whisper_binary }}"

      # ── Tauri build + release ───────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS notarization (optional — uncomment when certs are configured)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MoodHaven Journal ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG](https://github.com/kenlacroix/moodhaven-journal/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
        # Skip release creation on manual dry-run dispatches
        if: github.event_name == 'push' || inputs.dry_run == 'false'

      - name: Build Tauri app (dry run — no release)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'

      # Upload artifacts for the checksum job
      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          retention-days: 1

  # ── Android: Wear OS companion APK ─────────────────────────────────────────
  build-android:
    name: Build Android (Wear OS companion)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Update tauri.properties version to match release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 1000 + PATCH ))
          printf '// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.\ntauri.android.versionName=%s\ntauri.android.versionCode=%s\n' \
            "$VERSION" "$VERSION_CODE" \
            > src-tauri/gen/android/app/tauri.properties

      - name: Cache Gradle packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Wear OS release AAB
        working-directory: src-tauri/gen/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :wear:bundleRelease --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload AAB artifact (for release attachment in update-manifest)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: wear-aab
          path: src-tauri/gen/android/wear/build/outputs/bundle/release/wear-release.aab
          retention-days: 1

  # ── Android: Phone app APK (Tauri + Rust, arm64 only, debug-signed) ─────────
  build-android-phone:
    name: Build Android phone APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (2026-04-04)
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: src-tauri
          key: aarch64-linux-android

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Android phone release AAB (arm64)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # tauri-build requires the whisper sidecar to exist for each target. Sidecars
          # are desktop-only on Android (Android cannot exec arbitrary binaries) so we
          # create a placeholder that satisfies the file existence check.
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/whisper-aarch64-linux-android
          # NDK_HOME must be exported from the shell env, not ${{ env.* }}
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          npm run tauri android build -- --target aarch64

      - name: Upload phone AAB artifact (for release attachment in update-manifest)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: phone-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          retention-days: 1

  # ── Post-build: checksums + release notes ──────────────────────────────────
  update-manifest:
    needs: [build, build-android, build-android-phone]
    if: github.event_name == 'push' && !cancelled()
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 22

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts/

      - name: Attach Wear OS AAB to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AAB=$(find artifacts/wear-aab -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            gh release upload "${{ github.ref_name }}" "$AAB" --clobber
          fi

      - name: Attach phone AAB to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AAB=$(find artifacts/phone-aab -name "*.aab" | head -1)
          if [ -n "$AAB" ]; then
            gh release upload "${{ github.ref_name }}" "$AAB" --clobber
          fi

      - name: Generate checksums.txt and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: node scripts/generate-checksums.cjs

      - name: Generate latest-release.json and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUBLISHED_AT=$(gh release view "$TAG" --json publishedAt -q '.publishedAt')

          build_asset() {
            local name="$1"
            local size_bytes
            size_bytes=$(gh release view "$TAG" --json assets -q ".assets[] | select(.name == \"$name\") | .size" 2>/dev/null || echo "")
            if [ -z "$size_bytes" ]; then return; fi
            local size_mb
            size_mb=$(echo "scale=1; $size_bytes / 1048576" | bc)
            printf '    {"name":"%s","downloadUrl":"%s/%s","sizeLabel":"%s MB"}' \
              "$name" "$BASE" "$name" "$size_mb"
          }

          ASSETS=()
          for name in \
            "MoodHaven_${VERSION}_amd64.AppImage" \
            "MoodHaven_${VERSION}_amd64.deb" \
            "MoodHaven-${VERSION}-1.x86_64.rpm" \
            "MoodHaven_${VERSION}_x64-setup.exe" \
            "MoodHaven_${VERSION}_x64_en-US.msi" \
            "MoodHaven_${VERSION}_aarch64.dmg" \
            "MoodHaven_${VERSION}_x64.dmg" \
            "app-release.aab" \
            "wear-release.aab"; do
            entry=$(build_asset "$name")
            [ -n "$entry" ] && ASSETS+=("$entry")
          done

          ASSETS_JSON=$(printf '%s\n' "${ASSETS[@]}" | paste -sd ',' -)

          cat > latest-release.json << JSON
          {
            "version": "${VERSION}",
            "releaseUrl": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "publishedAt": "${PUBLISHED_AT}",
            "assets": [
          ${ASSETS_JSON}
            ]
          }
          JSON

          gh release upload "$TAG" latest-release.json --clobber

      - name: Update release notes from tag annotation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          if [ -n "$TAG_MSG" ]; then
            gh release edit "$TAG" --notes "$TAG_MSG"
          fi
