name: Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Allow one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Build on all platforms ────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64

          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            arch: aarch64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64

          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64

          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux: system libraries required by Tauri + cross-compile for arm64
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install aarch64 cross-compile toolchain (Linux arm64 only)
        if: matrix.platform == 'ubuntu-22.04' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      # Build and sign the app for the updater
      # TAURI_SIGNING_PRIVATE_KEY must be set in GitHub repository secrets.
      # Generate it locally with: npx tauri signer generate -w ~/.tauri/moodbloom.key
      # The public key goes into tauri.conf.json plugins.updater.pubkey
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MoodBloom ${{ github.ref_name }}
          # Release body is set by the update-manifest job from GitHub release notes
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Upload build artifacts for the manifest job to reference
      - name: Upload artifacts list
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
          retention-days: 1

  # ── Generate checksums.txt + update release notes ─────────────────────────────
  update-manifest:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums.txt and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: node scripts/generate-checksums.js

      - name: Update release notes from tag annotation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Use the annotated tag message as the release body (if present)
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || echo "")
          if [ -n "$TAG_MSG" ]; then
            gh release edit "$TAG" --notes "$TAG_MSG"
          fi
