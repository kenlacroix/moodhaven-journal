name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Frontend: TypeScript type-check + unit tests
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high/critical only)
        run: npm audit --audit-level=high

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Rust: cargo check + clippy + test
  # ─────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (2026-04-04)
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: src-tauri

      - name: Create stub whisper sidecar
        shell: bash
        run: |
          # tauri-build validates sidecar existence at compile time.
          # Create a stub binary for the current host triple so cargo check passes
          # without shipping a real whisper binary in CI.
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          EXT=""
          if [[ "$TRIPLE" == *"windows"* ]]; then EXT=".exe"; fi
          STUB="src-tauri/binaries/whisper-${TRIPLE}${EXT}"
          if [[ ! -f "$STUB" ]]; then
            printf '\x4D\x5A' > "$STUB" 2>/dev/null || touch "$STUB"
            echo "Created stub: $STUB"
          fi

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo audit (CVE check)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --quiet 2>/dev/null || true
          cargo audit

      - name: Cargo deny (supply chain)
        if: matrix.os == 'ubuntu-latest'
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979  # v2.0.15
        with:
          manifest-path: src-tauri/Cargo.toml

  # ─────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint (security rules, no auto-fix)
        run: npm run lint:ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (2026-04-04)
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
        with:
          workspaces: src-tauri

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

  # ─────────────────────────────────────────────
  # Secret scanning (gitleaks)
  # ─────────────────────────────────────────────
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
