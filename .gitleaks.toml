# Gitleaks configuration for MoodBloom
# Docs: https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

title = "MoodBloom Gitleaks Config"

[extend]
# Inherit all upstream rules from the default gitleaks config
useDefault = true

# ── Allowlist: patterns that are test fixtures or placeholders ────────────────
[[rules]]
id = "openai-api-key-allowlist"
description = "Allow sk-test and placeholder OpenAI keys used in test fixtures"

[[rules.allowlists]]
regexes = [
  # Test fixture value in settingsStore.test.ts
  "sk-test",
  # Placeholder in settings UI (not a real key)
  '''sk-\.{3}''',
]
