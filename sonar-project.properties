# SonarQube Cloud configuration
# Project + org keys are assigned when you install the SonarQube Cloud GitHub app
# and import the repo. Defaults below follow Sonar's "<login>_<repo>" convention —
# adjust if the import screen shows different values.
sonar.projectKey=kenlacroix_moodhaven-journal
sonar.organization=kenlacroix

# Sources: React/TS frontend + Rust backend
sonar.sources=src,src-tauri/src

# Tests (co-located vitest specs)
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx

# Coverage (vitest v8 -> lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated, vendored, and build output from analysis
sonar.exclusions=src-tauri/gen/**,src-tauri/target/**,dist/**,dist-web/**,coverage/**,node_modules/**,**/*.test.ts,**/*.test.tsx,scripts/**,website/**

# Don't measure coverage on files that have no unit tests by design
sonar.coverage.exclusions=src/test/**,src/**/*.test.*,src/main.tsx,src/vite-env.d.ts

sonar.sourceEncoding=UTF-8
