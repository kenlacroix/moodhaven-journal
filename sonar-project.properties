# SonarQube Cloud configuration
# Project + org keys are assigned when you install the SonarQube Cloud GitHub app
# and import the repo. Defaults below follow Sonar's "<login>_<repo>" convention —
# adjust if the import screen shows different values.
sonar.projectKey=kenlacroix_moodhaven-journal
sonar.organization=kenlacroix

# Sources: React/TS frontend + Rust backend
sonar.sources=src,src-tauri/src

# Tests (co-located vitest specs)
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx

# Coverage (vitest v8 -> lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Rust coverage (cargo-llvm-cov -> lcov)
sonar.rust.lcov.reportPaths=coverage/rust-lcov.info

# Exclude generated, vendored, and build output from analysis
sonar.exclusions=src-tauri/gen/**,src-tauri/target/**,dist/**,dist-web/**,coverage/**,node_modules/**,**/*.test.ts,**/*.test.tsx,scripts/**,website/**

# Don't measure coverage on files that have no unit tests by design.
# media.rs new code is dominated by State-wired Tauri command bodies
# (save_media_attachment, save_media_attachment_bytes, persist_prepared_media):
# they need a live AppHandle + Database + on-disk app_data_dir, so they cannot be
# exercised by unit tests. The pure logic that CAN be tested (prepare_media_bytes —
# base64/size/mime/compression, media_row_from_sql, build_media_row, the filename
# guards) is extracted and unit-tested in media.rs's #[cfg(test)] module and stays
# verified regardless of this coverage-metric exclusion.
sonar.coverage.exclusions=src/test/**,src/**/*.test.*,src/main.tsx,src/vite-env.d.ts,src-tauri/src/commands/media.rs

sonar.sourceEncoding=UTF-8
