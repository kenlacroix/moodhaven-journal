# cargo-audit configuration for MoodBloom
# https://docs.rs/cargo-audit/latest/cargo_audit/config/
#
# The advisories below are for unmaintained GTK3/GLib transitive dependencies
# pulled in by Tauri's Linux WebView stack (webkit2gtk → gtk3 → atk/gdk/glib/…).
# No fix version exists — these crates are deprecated as the ecosystem moved to
# GTK4. The security impact for a local desktop app is negligible as these
# codepaths have no network exposure from MoodBloom's perspective.

[advisories]
ignore = [
  # GTK3 bindings (unmaintained; Tauri Linux WebView dependency)
  "RUSTSEC-2024-0413",  # atk
  "RUSTSEC-2024-0416",  # atk-sys
  "RUSTSEC-2024-0412",  # gdk
  "RUSTSEC-2024-0418",  # gdk-sys
  "RUSTSEC-2024-0411",  # gdkwayland-sys
  "RUSTSEC-2024-0417",  # gdkx11
  "RUSTSEC-2024-0414",  # gdkx11-sys
  "RUSTSEC-2024-0415",  # gtk
  "RUSTSEC-2024-0420",  # gtk-sys
  "RUSTSEC-2024-0419",  # gtk3-macros
  "RUSTSEC-2024-0429",  # glib
  # Other unmaintained transitive deps (no fix version available)
  "RUSTSEC-2024-0370",  # proc-macro-error (pulled in by Tauri macros)
  "RUSTSEC-2025-0057",  # fxhash
  "RUSTSEC-2025-0081",  # unic-char-property
  "RUSTSEC-2025-0075",  # unic-char-range
  "RUSTSEC-2025-0080",  # unic-common
  "RUSTSEC-2025-0100",  # unic-ucd-ident
  "RUSTSEC-2025-0098",  # unic-ucd-version
]
