# cargo-deny configuration for MoodBloom
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny any crate with a known security vulnerability
vulnerability = "deny"
# Check unmaintained crates in workspace and transitive deps (none = ignore)
unmaintained = "none"
# Check unsound crates (none = ignore; set to "all" to enforce)
unsound = "none"
# Don't fail on yanked crates (may break in CI)
yanked = "warn"

[licenses]
# Deny any crate without a recognised license
unlicensed = "deny"
# Warn on copyleft licenses — none currently in the dependency tree,
# but worth a heads-up if they appear
copyleft = "warn"
# Allow these SPDX licence identifiers
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2015",
  "CC0-1.0",
  "Zlib",
  "OpenSSL",
]

[bans]
# Warn on duplicate dependency versions (can hide subtle version mismatches)
multiple-versions = "warn"
# Explicitly deny crates known to be insecure or unsuitable
deny = []

[sources]
# Only allow crates from crates.io (no private registries or arbitrary git sources)
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
