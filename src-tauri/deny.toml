# cargo-deny configuration for MoodBloom (cargo-deny 0.19+)
# Docs: https://embarkstudios.github.io/cargo-deny/
# Migration from pre-0.16: https://github.com/EmbarkStudios/cargo-deny/pull/611
#
# In 0.19+: vulnerability = "deny", unlicensed = "deny", copyleft = "warn"
# are the implicit defaults and have been removed as explicit config keys.

[advisories]
# Ignore advisories for unmaintained GTK3/Tauri transitive deps and other
# unfixable transitive deps. No fix version exists for any of these.
ignore = [
  # GTK3 bindings (unmaintained; Tauri Linux WebView dependency)
  "RUSTSEC-2024-0413",  # atk
  "RUSTSEC-2024-0416",  # atk-sys
  "RUSTSEC-2024-0412",  # gdk
  "RUSTSEC-2024-0418",  # gdk-sys
  "RUSTSEC-2024-0411",  # gdkwayland-sys
  "RUSTSEC-2024-0417",  # gdkx11
  "RUSTSEC-2024-0414",  # gdkx11-sys
  "RUSTSEC-2024-0415",  # gtk
  "RUSTSEC-2024-0420",  # gtk-sys
  "RUSTSEC-2024-0419",  # gtk3-macros
  "RUSTSEC-2024-0429",  # glib
  # Other unmaintained transitive deps (no fix version available)
  "RUSTSEC-2024-0370",  # proc-macro-error (pulled in by Tauri macros)
  "RUSTSEC-2025-0057",  # fxhash
  "RUSTSEC-2025-0081",  # unic-char-property
  "RUSTSEC-2025-0075",  # unic-char-range
  "RUSTSEC-2025-0080",  # unic-common
  "RUSTSEC-2025-0100",  # unic-ucd-ident
  "RUSTSEC-2025-0098",  # unic-ucd-version
]

[licenses]
# Allow these SPDX license identifiers; anything else is denied by default
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2015",
  "CC0-1.0",
  "Zlib",
  "OpenSSL",
]

[bans]
# Warn on duplicate dependency versions (can hide subtle version mismatches)
multiple-versions = "warn"
# Explicitly deny crates known to be insecure or unsuitable
deny = []

[sources]
# Only allow crates from crates.io (no private registries or arbitrary git sources)
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
