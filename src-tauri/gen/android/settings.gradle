include ':wear'

// tauri.settings.gradle is generated by `tauri android build` / `tauri android dev`
// and references local Cargo registry paths. Only include :app and Tauri plugin
// sub-projects when that file exists (local dev with Tauri CLI set up).
if (file('tauri.settings.gradle').exists()) {
    include ':app'
    apply from: 'tauri.settings.gradle'
}
