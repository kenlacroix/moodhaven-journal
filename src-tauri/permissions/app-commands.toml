# MoodHaven Journal app-level command permissions
# Grants the frontend access to all commands registered via invoke_handler! in lib.rs.
#
# Background: once any custom permission TOML exists in src-tauri/permissions/, Tauri v2
# activates strict ACL enforcement for the __app-acl__ namespace.  All invoke_handler!
# commands must be explicitly listed here or they will be blocked with:
#   "{command} not allowed. Command not found"
#
# This file is a companion to permissions/wear/autogenerated/reference.toml.

[[permission]]
identifier = "allow-all-app-commands"
description = "Allow all MoodHaven Journal app-level commands registered in invoke_handler!."
commands.allow = [
  # Session lock/unlock (must be allowed pre-auth)
  "verify_password",
  "unlock_app",
  "lock_app",
  # PIN unlock (pin_is_enabled + pin_unlock are pre-auth; pin_setup + pin_disable require unlock)
  "pin_is_enabled",
  "pin_setup",
  "pin_unlock",
  "pin_disable",
  # Password management
  "check_password_exists",
  "store_password_hash",
  "get_password_hash",
  # Journal entries
  "create_journal_entry",
  "get_journal_entry",
  "get_all_journal_entries",
  "get_journal_entries_by_date",
  "get_entries_on_this_day",
  "update_journal_entry",
  "delete_journal_entry",
  "patch_entry_location_weather",
  "patch_entry_pinned",
  "patch_entry_status",
  "sync_entry_tags",
  "get_book_tags",
  # Statistics
  "get_mood_statistics",
  "get_overall_statistics",
  # Analytics
  "get_mood_distribution",
  "get_streak_stats",
  "get_day_of_week_stats",
  "get_monthly_mood_data",
  "get_full_analytics_bundle",
  "get_insights_metadata",
  "get_year_heatmap",
  # Settings
  "get_setting",
  "set_setting",
  "delete_setting",
  "get_all_settings",
  "get_app_version",
  # Data management
  "factory_reset",
  "export_data",
  "import_data",
  "get_data_stats",
  "write_text_file",
  "write_binary_file",
  "exit_app",
  "get_log_path",
  "open_log_folder",
  "set_log_level",
  # Two-factor authentication
  "generate_totp_secret",
  "verify_totp_code",
  "enable_totp",
  "regenerate_backup_codes",
  "verify_backup_code",
  "get_backup_codes_count",
  "get_2fa_status",
  "disable_2fa",
  "verify_2fa_totp",
  "totp_needs_reencryption",
  # Hardware key (native FIDO2)
  "hardware_key_feature_available",
  "hardware_key_detect",
  "hardware_key_status",
  "hardware_key_register",
  "hardware_key_verify",
  "hardware_key_disable",
  "hardware_key_required",
  # Speech-to-Text
  "stt_check_sidecar",
  "stt_get_models_dir",
  "stt_check_model",
  "stt_download_model",
  "stt_delete_model",
  "stt_transcribe",
  "stt_transcribe_timestamped",
  "stt_cancel_download",
  # Books (named journals)
  "list_books",
  "create_book",
  "update_book",
  "delete_book",
  # Oura Ring health integration
  "oura_validate_pat",
  "oura_save_pat",
  "oura_disconnect",
  "oura_get_status",
  "oura_sync_today",
  "oura_get_context",
  "oura_get_history",
  "oura_backfill",
  # Media attachments
  "save_media_attachment",
  "list_entry_media",
  "list_all_media",
  "open_media_attachment",
  "get_media_thumbnail",
  "delete_media_attachment",
  # Media sync helpers
  "read_media_for_sync",
  "write_media_from_sync",
  # Multi-device sync
  "get_entry_timestamps",
  "upsert_entry_from_sync",
  # Update manager
  "check_for_update",
  "download_and_install_update",
  # Breakout writer window
  "open_writer_window",
  # Session bridge — main window stores, writer window retrieves (one-shot)
  # retrieve_session_password is intentionally NOT listed here; only the writer
  # window capability (allow-writer-commands) grants retrieve access, preventing
  # the main window from draining the bridge before the writer window can read it.
  "store_session_password",
  # Signals (structured data points, Wear OS events, health snapshots)
  "create_signal",
  "list_signals",
  "link_signal_to_entry",
  "list_entry_signals",
  "delete_signal",
  # Sync log (incremental sync infrastructure)
  "get_unsynced_log",
  "mark_sync_log_synced",
  # Voice memos (Wear OS audio recordings)
  "store_voice_memo",
  "list_voice_memos",
  "get_voice_memo",
  "delete_voice_memo",
  "patch_voice_memo_transcription",
  "link_voice_memo_to_entry",
  "transcribe_voice_memo",
  # Voice memo draft pipeline (Phase 5 — v1.2.0)
  "patch_voice_memo_context",
  "patch_voice_memo_mood",
  "list_pending_drafts",
  "publish_voice_memo_draft",
  "discard_voice_memo_draft",
  # Peer-to-peer sync — Phase 1: identity + discovery
  "peer_get_identity",
  "peer_rename_device",
  "peer_discovery_start",
  "peer_discovery_stop",
  "peer_get_nearby",
  "peer_discovery_is_active",
  # Peer-to-peer sync — Phase 2: secure pairing
  "peer_generate_pairing_token",
  "peer_accept_pairing",
  "peer_get_trusted",
  "peer_revoke_device",
  "peer_cancel_pairing",
  "peer_pairing_is_active",
  # Peer-to-peer sync — Phase 3: sync engine
  "peer_start_sync_server",
  "peer_sync_now",
  "peer_get_sync_states",
  # Peer-to-peer sync — setup-time full DB restore
  "peer_full_restore",
  "peer_apply_and_restart",
  # Full-DB restore consent gate (serving side arms before a new device pulls)
  "peer_arm_restore",
  "peer_disarm_restore",
  "peer_restore_is_armed",
  # Time capsule
  "seal_entry",
  "get_due_capsules",
  "unseal_entry",
  "get_mood_delta",
  # StillHaven (somatic session module)
  "still_create_session",
  "still_record_activation",
  "still_complete_session",
  "still_abandon_session",
  "still_list_sessions",
  "still_get_session_with_samples",
  # StillHaven v1.3.0 narrative layer
  "still_get_session_brief",
  "still_get_journal_brief_for_session",
  "still_get_wellbeing_context",
  # StillHaven v1.4.0 effect stats
  "still_get_effect_stats",
  # StillHaven v1.5.0 wrist-loop signal link
  "still_link_signal_to_session",
  # Journal ↔ session link
  "link_journal_entry_to_session",
  # Activities (structured entry tagging — v1.8.0)
  "list_activities",
  "create_activity",
  "delete_activity",
  "sync_entry_activities",
  "get_entry_activities",
  "get_activity_stats",
  "list_all_entry_activities",
  # Desktop biometric unlock (OS keyring — v1.6.0)
  "biometric_is_available",
  "biometric_store_session",
  "biometric_retrieve_session",
  "biometric_clear_session",
  # Cloud provider OAuth sync (Phase 1 — v1.6.0)
  "cloud_provider_auth_start",
  "cloud_provider_upload_blob",
  "cloud_provider_download_blob",
  "cloud_provider_status",
  "cloud_provider_disconnect",
  "cloud_provider_refresh_token",
]

[[permission]]
identifier = "allow-writer-commands"
description = "Minimal command set for the breakout writer window. Excludes factory_reset, export_data, peer sync, 2FA management, and other main-window-only operations."
commands.allow = [
  # Auth (writer must unlock via session bridge)
  # get_password_hash is intentionally excluded — the writer window uses
  # verify_password (Rust-side comparison) and never needs the raw hash+salt.
  # Removing it prevents hash exfiltration if the writer WebView is compromised.
  "verify_password",
  "unlock_app",
  "check_password_exists",
  # Session bridge (password hand-off — retrieve is writer-only)
  "retrieve_session_password",
  # Journal CRUD
  "create_journal_entry",
  "get_journal_entry",
  "get_all_journal_entries",
  "update_journal_entry",
  "patch_entry_pinned",
  "patch_entry_status",
  "patch_entry_location_weather",
  "sync_entry_tags",
  "get_book_tags",
  # Books (read-only needed for writer)
  "list_books",
  # Analytics (streak / stats shown in writer)
  "get_streak_stats",
  "get_overall_statistics",
  # Settings
  "get_setting",
  "set_setting",
  "get_app_version",
  # Media
  "save_media_attachment",
  "list_entry_media",
  "open_media_attachment",
  "get_media_thumbnail",
  "delete_media_attachment",
  # Voice memos
  "store_voice_memo",
  "list_voice_memos",
  "get_voice_memo",
  "delete_voice_memo",
  "patch_voice_memo_transcription",
  "link_voice_memo_to_entry",
  "transcribe_voice_memo",
  # Voice memo draft pipeline (Phase 5)
  "patch_voice_memo_context",
  "patch_voice_memo_mood",
  "list_pending_drafts",
  "publish_voice_memo_draft",
  "discard_voice_memo_draft",
  # Speech-to-Text
  "stt_check_sidecar",
  "stt_check_model",
  "stt_transcribe",
  "stt_transcribe_timestamped",
  # StillHaven session link (for journal handoff)
  "link_journal_entry_to_session",
]

[default]
permissions = ["allow-all-app-commands"]
