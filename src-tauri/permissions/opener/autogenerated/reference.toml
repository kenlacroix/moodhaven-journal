# Opener plugin permissions (Android-native OpenerPlugin)
# Allows the TypeScript layer to invoke the Kotlin OpenerPlugin via
# window.__TAURI_INTERNALS__.invoke('plugin:opener|commandName', args).

[[permission]]
identifier = "allow-opener-open-file"
description = "Allow opening a local file with the system viewer via an ACTION_VIEW intent."
commands.allow = ["openFile"]

[default]
permissions = [
  "allow-opener-open-file",
]
